<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marcação enviada — Barbearia do Miguel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✂</text></svg>">
  <script>tailwind.config={theme:{extend:{colors:{dark:'#0a0a0a',surface:'#111111',red:'#c41e3a'},fontFamily:{serif:['"Cormorant Garamond"','serif'],sans:['Inter','sans-serif']}}}}</script>
</head>
<body class="bg-dark text-cream font-sans antialiased min-h-screen flex flex-col items-center justify-center px-6">

  <div class="text-center max-w-md fade-up">
    <p class="text-red text-4xl mb-6" aria-hidden="true">✂</p>
    <h1 class="font-serif text-4xl md:text-5xl font-light mb-4">
      Marcação <em class="text-red">enviada!</em>
    </h1>
    <div class="w-10 h-0.5 bg-red mx-auto my-6"></div>
    <p class="text-[#ede8e3]/55 font-light leading-relaxed text-sm mb-3">
      Recebemos o seu pedido. Entraremos em contacto brevemente para confirmar a disponibilidade.
    </p>
    <p class="text-[#ede8e3]/35 text-xs mb-10">
      Para confirmação imediata ligue para
      <a href="tel:910473484" class="text-red">910 473 484</a>
    </p>
    <div class="flex flex-col sm:flex-row gap-3 justify-center">
      <a href="index.html" class="btn-primary">← Voltar ao site</a>
      <a href="marcacoes.html" class="btn-outline">Nova marcação</a>
    </div>
  </div>

  <p class="absolute bottom-8 text-[#ede8e3]/20 text-xs">Barbearia do Miguel · Paredes</p>

  <script>
    document.querySelectorAll('.fade-up').forEach((el,i) => {
      el.style.animation = `fadeUp 700ms cubic-bezier(0.23,1,0.32,1) ${i*120}ms both`;
    });
  </script>
</body>
</html>
